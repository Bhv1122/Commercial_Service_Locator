<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Service Locator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        darker: '#020617',
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                        accent: '#f43f5e',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-darker text-slate-300 font-sans min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="glassmorphism sticky top-0 z-50 border-b border-slate-700/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center gap-2">
                        <i class="fa-solid fa-truck-medical text-accent text-2xl animate-pulse-slow"></i>
                        <span class="font-bold text-xl text-white tracking-wider">Locator<span class="text-primary">Sys</span></span>
                    </div>
                    <div class="hidden md:block">
                        <div class="ml-10 flex items-baseline space-x-4">
                            <a href="/" class="hover:bg-slate-800 text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Map & Visualizer</a>
                            <a href="/dashboard" class="hover:bg-slate-800 text-slate-300 px-3 py-2 rounded-md text-sm font-medium transition-colors">Performance</a>
                            <a href="/admin" class="hover:bg-slate-800 text-slate-300 px-3 py-2 rounded-md text-sm font-medium transition-colors">Admin Panel</a>
                            <a href="/education" class="hover:bg-slate-800 text-slate-300 px-3 py-2 rounded-md text-sm font-medium transition-colors">Education</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="glassmorphism mt-auto border-t border-slate-700/50 py-4">
        <div class="text-center text-sm text-slate-500">
            &copy; 2026 Emergency Service Locator using Closest Pair of Points Algorithm
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
