{% extends "base.html" %}

{% block content %}
<!-- Back button + header -->
<div class="flex items-center gap-3 mb-4">
    <a href="/" class="flex items-center gap-2 text-slate-400 hover:text-white transition text-sm">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>
    <div class="h-4 w-px bg-slate-600"></div>
    <div class="flex items-center gap-2">
        <i class="fa-solid {{ category_icon }} text-lg" style="color: var(--category-color)"></i>
        <h1 class="text-white font-bold text-lg">Nearest {{ category_label }}</h1>
    </div>
    <!-- Filters inline -->
    <div class="ml-auto flex items-center gap-3 flex-wrap">
        <select id="filter-rating" class="bg-slate-800 border border-slate-600 text-white text-xs rounded-lg px-3 py-1.5 focus:outline-none focus:border-primary">
            <option value="0">Any Rating</option>
            <option value="3">3.0+ ⭐</option>
            <option value="3.5">3.5+ ⭐</option>
            <option value="4">4.0+ ⭐⭐</option>
            <option value="4.5">4.5+ ⭐⭐⭐</option>
        </select>
        <select id="filter-radius" class="bg-slate-800 border border-slate-600 text-white text-xs rounded-lg px-3 py-1.5 focus:outline-none focus:border-primary">
            <option value="2000">2 km</option>
            <option value="5000" selected>5 km</option>
            <option value="10000">10 km</option>
            <option value="20000">20 km</option>
        </select>
        <button id="btn-find-nearest"
            class="flex items-center gap-2 bg-gradient-to-r from-primary to-indigo-600 hover:from-primary hover:to-indigo-500 text-white text-xs py-1.5 px-4 rounded-lg font-medium transition active:scale-95">
            <i class="fa-solid fa-bolt"></i> Find Nearest (D&C)
        </button>
        <button id="btn-refresh"
            class="flex items-center gap-2 bg-slate-700 hover:bg-slate-600 text-white text-xs py-1.5 px-3 rounded-lg transition">
            <i class="fa-solid fa-rotate-right"></i> Refresh
        </button>
    </div>
</div>

<!-- Split Layout: Map (left) | List (right) -->
<div class="flex gap-4" style="height: calc(100vh - 13rem);">

    <!-- MAP HALF -->
    <div class="flex-1 relative card-glass rounded-2xl overflow-hidden">
        <!-- Loading overlay -->
        <div id="map-loading" class="absolute inset-0 z-20 bg-slate-900/80 flex flex-col items-center justify-center rounded-2xl">
            <i class="fa-solid fa-spinner fa-spin text-primary text-4xl mb-3"></i>
            <div id="map-loading-text" class="text-white font-medium text-sm">Getting your location...</div>
        </div>
        <div id="map" class="w-full h-full"></div>

        <!-- D&C Result Overlay on map -->
        <div id="result-overlay" class="hidden absolute bottom-4 left-4 right-4 z-10 glassmorphism rounded-xl p-4 border border-primary/30">
            <div class="flex items-start justify-between gap-3">
                <div class="flex-grow">
                    <div class="text-xs text-slate-400 uppercase tracking-wide mb-1">
                        <i class="fa-solid fa-trophy text-yellow-400 mr-1"></i> Nearest (D&C Result)
                    </div>
                    <div id="result-name" class="text-white font-bold text-base"></div>
                    <div id="result-rating" class="text-yellow-400 text-xs mt-0.5"></div>
                    <div id="result-dist" class="text-emerald-400 font-semibold text-sm mt-1"></div>
                </div>
                <div class="text-right text-xs text-slate-500 flex-shrink-0">
                    <div>D&C: <span id="result-dc-time" class="text-primary font-mono"></span></div>
                    <div>BF: <span id="result-bf-time" class="text-slate-400 font-mono"></span></div>
                    <div>Comps: <span id="result-comp" class="text-slate-300 font-mono"></span></div>
                </div>
            </div>
            <!-- Formula -->
            <div class="mt-3 bg-slate-900/70 rounded-lg p-2 text-xs">
                <div class="text-slate-500 mb-1">Euclidean Distance Formula:</div>
                <div class="font-mono text-emerald-300 mb-1">d = √((x₂−x₁)² + (y₂−y₁)²)</div>
                <div id="result-formula" class="font-mono text-slate-300 break-all leading-relaxed"></div>
            </div>
        </div>
    </div>

    <!-- LIST HALF -->
    <div class="w-80 lg:w-96 flex flex-col card-glass rounded-2xl overflow-hidden">
        <!-- List Header -->
        <div class="p-4 border-b border-slate-700">
            <div class="flex items-center justify-between mb-2">
                <div>
                    <span id="list-count" class="text-white font-semibold text-sm"></span>
                    <span class="text-slate-400 text-xs ml-1">places found</span>
                </div>
                <div class="flex gap-1">
                    <button id="sort-dist" class="text-xs px-2.5 py-1 rounded-lg bg-primary text-white font-medium transition">
                        <i class="fa-solid fa-route text-xs mr-1"></i>Distance
                    </button>
                    <button id="sort-rating" class="text-xs px-2.5 py-1 rounded-lg bg-slate-700 text-slate-300 hover:bg-slate-600 transition">
                        <i class="fa-solid fa-star text-xs mr-1"></i>Rating
                    </button>
                </div>
            </div>
            <!-- Status bar -->
            <div id="list-status" class="text-xs text-slate-500">
                <i class="fa-solid fa-location-crosshairs text-primary mr-1"></i>
                <span id="list-status-text">Detecting your location...</span>
            </div>
        </div>

        <!-- List Body -->
        <div id="places-list" class="flex-1 overflow-y-auto p-3 space-y-2">
            <!-- Skeleton loaders -->
            <div class="skeleton-item animate-pulse bg-slate-700/50 rounded-xl h-20"></div>
            <div class="skeleton-item animate-pulse bg-slate-700/50 rounded-xl h-20"></div>
            <div class="skeleton-item animate-pulse bg-slate-700/50 rounded-xl h-20"></div>
            <div class="skeleton-item animate-pulse bg-slate-700/50 rounded-xl h-20"></div>
        </div>
    </div>

</div>

<!-- Pass data to JS + inject CSS variable to avoid linter warnings -->
<style>
    :root { --category-color: {{ category_color }}; }
</style>
<script>
    const PAGE_CATEGORY = "{{ category }}";
    const PAGE_CATEGORY_LABEL = "{{ category_label }}";
    const PAGE_CATEGORY_COLOR = "{{ category_color }}";
    const PAGE_CATEGORY_ICON = "{{ category_icon }}";
</script>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/places.js') }}?v=4"></script>

{% endblock %}
