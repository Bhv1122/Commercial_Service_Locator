{% extends "base.html" %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-4 gap-6 h-[calc(100vh-10rem)]">
    
    <!-- Sidebar Controls -->
    <div class="lg:col-span-1 card-glass p-5 flex flex-col gap-4 overflow-y-auto">
        <h2 class="text-xl font-bold text-white border-b border-slate-600 pb-2">Control Panel</h2>
        
        <div class="space-y-3">
            <h3 class="text-sm uppercase tracking-wider text-slate-400 font-semibold">Mode Selection</h3>
            <div class="flex flex-col gap-2">
                <label class="flex items-center gap-2 cursor-pointer bg-slate-800 p-2 rounded hover:bg-slate-700 transition">
                    <input type="radio" name="mode" value="emergency" checked class="text-accent focus:ring-accent">
                    <span><i class="fa-solid fa-bell text-accent w-5"></i> Add Emergency</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer bg-slate-800 p-2 rounded hover:bg-slate-700 transition">
                    <input type="radio" name="mode" value="hospital" class="text-primary focus:ring-primary">
                    <span><i class="fa-solid fa-hospital text-primary w-5"></i> Add Hospital</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer bg-slate-800 p-2 rounded hover:bg-slate-700 transition">
                    <input type="radio" name="mode" value="police" class="text-blue-400 focus:ring-blue-400">
                    <span><i class="fa-solid fa-shield-halved text-blue-400 w-5"></i> Add Police</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer bg-slate-800 p-2 rounded hover:bg-slate-700 transition">
                    <input type="radio" name="mode" value="fire" class="text-orange-500 focus:ring-orange-500">
                    <span><i class="fa-solid fa-fire text-orange-500 w-5"></i> Add Fire Station</span>
                </label>
            </div>
        </div>

        <div class="space-y-3 mt-4">
            <h3 class="text-sm uppercase tracking-wider text-slate-400 font-semibold">Actions</h3>
            <button id="btn-run-algo" class="w-full bg-gradient-to-r from-primary to-indigo-600 hover:from-primary hover:to-indigo-500 text-white py-2 px-4 rounded-lg shadow-lg font-medium transition transform active:scale-95 flex items-center justify-center gap-2">
                <i class="fa-solid fa-bolt"></i> Run Locator Algorithm
            </button>
            <button id="btn-clear" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-2 px-4 rounded-lg font-medium transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-trash-can"></i> Clear Map
            </button>
            <button id="btn-generate" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-2 px-4 rounded-lg font-medium transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-dice"></i> Generate Random
            </button>
        </div>

        <div id="results-panel" class="hidden mt-4 bg-slate-800/50 p-4 rounded-lg border border-slate-600">
            <h3 class="font-bold text-white mb-2"><i class="fa-solid fa-chart-simple text-primary"></i> Algorithm Results</h3>
            <div class="text-sm space-y-2">
                <div class="flex justify-between">
                    <span class="text-slate-400">Nearest Service:</span>
                    <span id="res-service" class="font-medium text-white">-</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400">Distance:</span>
                    <span id="res-dist" class="font-medium text-emerald-400">-</span>
                </div>
                <div class="border-t border-slate-700 my-2 pt-2"></div>
                <div class="flex justify-between items-center text-xs">
                    <span class="text-slate-400">D&C Time:</span>
                    <span id="res-dc-time" class="text-primary font-mono bg-primary/10 px-1 py-0.5 rounded">-</span>
                </div>
                <div class="flex justify-between items-center text-xs">
                    <span class="text-slate-400">Brute Force Time:</span>
                    <span id="res-bf-time" class="text-orange-400 font-mono bg-orange-400/10 px-1 py-0.5 rounded">-</span>
                </div>
                <div class="flex justify-between items-center text-xs mt-1">
                    <span class="text-slate-400">Comparisons (D&C / BF):</span>
                    <span id="res-comp" class="text-slate-300 font-mono">-</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Map Canvas -->
    <div class="lg:col-span-3 card-glass relative flex flex-col">
        <!-- Overlay HUD -->
        <div class="absolute top-4 left-4 z-10 glassmorphism px-4 py-2 rounded-lg text-sm flex gap-4 pointer-events-none shadow-lg">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-accent animate-pulse"></div> Emergency
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-primary"></div> Service
            </div>
        </div>

        <canvas id="map-canvas" class="w-full h-full rounded-xl cursor-crosshair"></canvas>
        
        <!-- Tooltip -->
        <div id="tooltip" class="absolute hidden bg-slate-900 text-white text-xs px-2 py-1 rounded border border-slate-700 pointer-events-none transform -translate-x-1/2 -translate-y-full mt-[-10px] z-50"></div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/visualization.js') }}"></script>
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
{% endblock %}
